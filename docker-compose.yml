networks:
  network:
    driver: bridge
services:
  mysql:
    container_name: mysql
    image: mysql:8.4.5
    restart: always
    environment:
      MYSQL_DATABASE: demo
      MYSQL_ROOT_PASSWORD: 123456
    command:
      - mysqld
      - --max_allowed_packet=128M
      - --innodb_buffer_pool_size=256M
    ports:
      - '3007:3306'
    volumes:
      - ./data/mysql:/var/lib/mysql
